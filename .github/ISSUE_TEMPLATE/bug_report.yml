name: Bug report
description: Report a reproducible bridge problem without private data
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Remove usernames, device names, conversation contents, credentials, and full local paths before submitting.
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include the exact `/cg` command with private content replaced.
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows and WSL version
    validations:
      required: true
  - type: input
    id: hermes
    attributes:
      label: Hermes version
    validations:
      required: true
  - type: input
    id: chatgpt
    attributes:
      label: ChatGPT desktop package version
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Normal /cg
        - --no-focus
        - --project / --chat
        - --run
        - --show
        - --reset
    validations:
      required: true
  - type: textarea
    id: error
    attributes:
      label: Sanitized error
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed secrets, conversation content, personal names, device names, and full local paths.
          required: true
